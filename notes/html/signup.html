<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <style>
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .form-group button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Signup</h2>
        <form>
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" autocomplete="tel" required>
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" autocomplete="street-address" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of birth:</label>
                <input type="date" id="dob" name="dob" autocomplete="bday" required>
            </div>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>
            </div>
            <div class="form-group">
                <button type="submit">Signup</button>
            </div>
        </form>

    </div>
    <script src="../js/config-firebase.js"></script>
    <script>
        var db = firebase.firestore();
        var form = document.querySelector('form');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.querySelector('#name').value;
            var email = document.querySelector('#email').value;
            var phone = document.querySelector('#phone').value;
            var address = document.querySelector('#address').value;
            var dob = document.querySelector('#dob').value;
            var username = document.querySelector('#username').value;
            var password = document.querySelector('#password').value;

            //create personal and user information object
            var personalInfo = {
                name: name,
                email: email,
                phone: phone,
                address: address,
                dob: dob
            }
            var userInfo = {
                username: username,
                password: password
            }

            //create user
            firebase.auth().createUserWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                // Signed in 
                var user = userCredential.user;
                // Send email verification
                user.sendEmailVerification().then(function() {
                    // Email verification sent!
                    //add personal information to firestore
                    db.collection('users').doc(user.uid).set(personalInfo)
                    .then(function() {
                        //add user information to firestore
                        db.collection('users').doc(user.uid).collection('user-info').doc('info').set(userInfo)
                        .then(function() {
                            alert('Signup successful');
                            window.location.href = 'login.html';
                        })
                        .catch(function(error) {
                            alert(error.message);
                        });
                    })
                    .catch(function(error) {
                        alert(error.message);
                    });
                }).catch(function(error) {
                    // An error happened.
                    alert(error.message);
                });
            })
            .catch(function(error) {
                // Handle Errors here.
                var errorCode = error.code;
                var errorMessage = error.message;
            });
        });

        


    </script> 
</body>
</html>
