<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/post.css">
    <link rel="stylesheet" href="../css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    
    <title>Homepage</title>
</head>
<body>
    <div id="loading-screen">
        <!-- You can put your loading animation or text inside this div -->
        <p>Loading...</p>
    </div>

    <!-- Rest of your page content goes here -->
    <div class="clock-fixed">
        <p>It's your clock ticking...</p>
        <div class="clock" id="clock">
        </div>
    </div>  

    <div class="header">
        <!-- header left -->
        <div class="header-left">
            <img title="Hehe. if u click nothing will happen" class="logo" id="logo" src="../images/logo.jpg" alt="Logo">
        </div>

        <!-- header center -->
        <div class="header-center">
            <span id="home"><a href="index.html">Home</a></span>
            <span id="explore">Explore</span>
            <span id="other"><a href="html/form.html">Add Note</a></span>
        </div>

        <!-- header right  -->
        <div class="header-right">
            <div class="header-right-up">
                <!-- logout-icon -->
                <ion-icon id="logout-btn" name="log-out-outline"></ion-icon>
                <ion-icon id="toggle-btn" name="moon"></ion-icon>
                <div class="header-profile-image" id="logged">
                    <img src="" alt="" id="header-profile-image" class="user-profile-image">
                </div>
            </div>
            <div class="header-right-down">
                Good Afternoon, <span id="name"></span>
            </div>
        </div>
    </div>

    <div class="body-container">
        <div class="head-desc">
            <h1>Explore</h1>
            <p>Navigate through our website.</p>
        </div>

        <!-- category list -->
        <div class="catogories-list" id="catagories-list">
            
        </div>
    </div>
    <!-- footer -->
    <div class="end-note">
        <h3>Made with ❤️ <span>by cat</span></h3>
        <p>© 2024 cat. All rights reserved.</p>
    </div>
    <script src="js/clock.js"></script>
    <script src="js/cookie.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/config-firebase.js"></script>
    <script src="js/isLogged.js"></script>
    <script src="js/loadprofile.js"></script>
    <script>
        const catagories = document.querySelector('#catagories-list');
        function retrieveTitle(){
            db.collection("bidBase").get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    const data = doc.data();

                    const title = data.main.module;

                    const modulediv = document.createElement('div');
                    modulediv.classList.add('catagory');
                    modulediv.id = title;
                    modulediv.dataset.id = doc.id;
                    modulediv.innerHTML = `<a href="html/postpage.html">${title}</a>`;
                    catagories.appendChild(modulediv);

                });
            });
        }

        retrieveTitle();
    </script>

</body>
</html>
