<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/theme.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth-compat.js"></script>
    <style>
        body{
            background-color: var(--background-color);
        }
        .formdiv{
            border: 1px solid blanchedalmond;
            border-radius: 5px;
            padding: 10px;
            margin: 10px;
        }
        form{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        input{
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: 1px solid #4c4b4b;
            background-color: transparent;
            outline: none;
        }
        textarea{
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: 1px solid #4c4b4b;
            background-color: transparent;
            outline: none;
            resize: none;
            overflow: auto;
            max-width: 100%;
            /* scrollbar-width: none; */
        }
        textarea::-webkit-scrollbar {
            display: none;
        }   
        .row{
            display: flex;
            flex-direction: column;
            width: 100%;
            border : 1px solid #4c4b4b;
            padding: 10px;
            border-radius: 5px; 
            margin: 10px 0 0 0;
        }
        .buttons{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            margin: 10px;
        }
        button{
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: 1px solid #4c4b4b;
            background-color: transparent;
            outline: none;
            color: inherit !important;
        }
        button:hover{
            background-color: #4c4b4b;
            color: rgb(209, 203, 203);
            transition: 0.5s;
        }
        #validateFormerror{
            color: red;
            margin: 10px;
        }
        input[type="dropdown"], #inputTypeSelect{
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: 1px solid #4c4b4b;
            background-color: transparent;
            outline: none;
            color: inherit !important;
        }
        option{
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            border: 1px solid #4c4b4b;
            background-color: transparent;
            outline: none;
            color: inherit !important;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <p>Loading...</p>
    </div>

    <div class="header" id="header">
        <!-- header left -->
        <div class="header-left">
            <img class="logo" id="logo" src="../images/logo.jpg" alt="Logo">
        </div>

        <!-- header center -->
        <div class="header-center">
            <span id="home"><a href="../index.html">Home</a></span>
            <span id="explore">Explore</span>
            <span id="other"><a href="../html/form.html">Add Note</a></span>
        </div>

        <!-- header right  -->
        <div class="header-right">
            <div class="header-right-up">
                <!-- logout-icon -->
                <ion-icon id="logout-btn" name="log-out-outline"></ion-icon>
                <ion-icon id="toggle-btn" name="moon"></ion-icon>
                <div class="header-profile-image" id="logged">
                    <img src="" alt="" id="header-profile-image" class="user-profile-image">
                </div>
            </div>
            <div class="header-right-down">
                Good Afternoon, <span id="name"></span>
            </div>
        </div>
    </div>

    <div class="background">
     
        <div id="formField" class="formdiv">
            <div class="authour-details">
                <legend>Author details</legend>
                <label for="title">Title: </label>
                <input type="text" id="title" name="title"> <br>
                <!-- <span id="titileError" style="color: red;"></span> <br>  -->
                <label for="desc">Description: </label>
                <input type="text" id="desc" name="desc"> <br>
                <!-- <span id="descError" style="color: red;"></span> -->
                <label for="module">Reference module Number (Eg: IT1010 )</label>
                <input type="text" id="module" name="module"> <br>
                <!-- <span id="moduleError" style="color: red;"></span> -->
                <label for="remarks">Remarks: </label>
                <input type="text" id="remarks" name="remarks"> <br> <br>
                <!-- <span id="remarksError" style="color: red;"></span> -->
            </div>
            <hr>
            <form id="form-note" onsubmit="return false" autocomplete="on">
                <div class="row">
                    <label for="note-part-" >note-part</label><br>
                    <textarea name="note-part-" id="note-part-" rows="1" data-input-type="text"></textarea>
                </div>
                <div class="rowEnd" hidden>
                    <button class="button" name="deletePerson" type="button" id="deletePerson" value="delete" onclick="deleteForm(this.parentElement)"> Delete </button>
                </div>
            </form>
        </div>
        <!-- <div id="inputTypeModal" style="display: none;"> -->
            <!-- <select id="inputTypeSelect">
                <option value="text">Paragraph</option>
                <option value="heading">Heading</option>
                <option value="subheading">Subheading</option>
                <option value="image">Image</option>
            </select>
            <button onclick="closeModal()">OK</button> -->
        <div>
            <button onclick="addForm(event)" id="text">Paragraph</button>
            <button onclick="addForm(event)" id="heading">Heading</button>
            <button onclick="addForm(event)" id="subheading">Subheading</button>
            <button onclick="addForm(event)" id="image">Image</button>
        </div>
        <span id="validateFormerror"></span>
        <div class="buttons">
            <!-- <div class="column">
                <button class="button" type="button" value="new-note" id="addnote" onclick="addForm()">Add note</button>
            </div> -->
            <div class="column">
                <button class="button" type="button" value="Upload" id="saveData" onclick="saveData()">Upload</button>
            </div>
        </div>
    <script src="../js/config-firebase.js"></script>
    <script src="../js/form.js"></script> 
    <script src="../js/cookie.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/isLogged.js"></script>
    <script src="../js/loadprofile.js"></script>
    </body>
    
</html>
